<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Frontend Linh Kiện</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/user.css">
</head>
<body data-page="register" data-base-path="">
    <div id="site-header"></div>

    <main>
        <section class="container page-shell">
            <section class="page-hero">
                <nav class="page-breadcrumb">
                    <a href="index.html">Trang chủ</a>
                    <span>/</span>
                    <span class="current">Đăng ký</span>
                </nav>
                <h1 class="mb-3">Tạo tài khoản mới</h1>
                <p class="mb-0">Form đăng ký bám theo bảng `tai_khoan`, không còn fake register flow ở frontend.</p>
            </section>

            <div class="auth-card">
                <h2 class="h3 fw-bold text-center mb-4">Đăng ký tài khoản</h2>
                <form id="register-form" class="d-grid gap-3">
                    <div>
                        <label class="form-label fw-semibold">Họ tên</label>
                        <input id="register-ho-ten" type="text" class="form-control" required>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Email</label>
                        <input id="register-email" type="email" class="form-control" required>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Tên đăng nhập</label>
                        <input id="register-ten-dang-nhap" type="text" class="form-control" required>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input id="register-so-dien-thoai" type="tel" class="form-control">
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Giới tính</label>
                            <select id="register-gioi-tinh" class="form-select">
                                <option value="">Chưa cập nhật</option>
                                <option value="nam">Nam</option>
                                <option value="nu">Nữ</option>
                                <option value="khac">Khác</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ngày sinh</label>
                            <input id="register-ngay-sinh" type="date" class="form-control">
                        </div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Mật khẩu</label>
                            <input id="register-password" type="password" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nhập lại mật khẩu</label>
                            <input id="register-confirm-password" type="password" class="form-control" required>
                        </div>
                    </div>
                    <button class="btn btn-primary" type="submit">Tạo tài khoản</button>
                </form>
                <p class="text-center text-muted mt-4 mb-0">
                    Đã có tài khoản?
                    <a class="text-primary fw-semibold" href="login.html">Đăng nhập</a>
                </p>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
