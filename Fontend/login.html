<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | TK Grear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/user.css">
</head>
<body data-page="login" data-base-path="">
    <div id="site-header"></div>

    <main>
        <section class="container page-shell">
            <section class="page-hero">
                <nav class="page-breadcrumb">
                    <a href="index.html">Trang chủ</a>
                    <span>/</span>
                    <span class="current">Đăng nhập</span>
                </nav>
                <h1 class="mb-3">Đăng nhập tài khoản</h1>
                <p class="mb-0">Đăng nhập để tiếp tục mua sắm, theo dõi đơn hàng và quản lý tài khoản của bạn.</p>
            </section>

            <div class="auth-card">
                <h2 class="h3 fw-bold text-center mb-4">Chào mừng quay lại</h2>
                <form id="login-form" class="d-grid gap-3">
                    <div>
                        <label class="form-label fw-semibold">Email hoặc tên đăng nhập</label>
                        <input id="login-identifier" type="text" class="form-control" placeholder="Nhập email hoặc tên đăng nhập" required>
                    </div>
                    <div>
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <input id="login-password" type="password" class="form-control" placeholder="Nhập mật khẩu" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Đăng nhập</button>
                </form>
                <div class="auth-side-note mt-4">
                    <div class="fw-bold mb-2">Thông tin đăng nhập</div>
                    <div class="small text-muted mb-0">Sau khi đăng nhập thành công, hệ thống sẽ ghi nhớ tài khoản để bạn mua sắm thuận tiện hơn.</div>
                </div>
                <p class="text-center text-muted mt-4 mb-0">
                    Chưa có tài khoản?
                    <a class="text-primary fw-semibold" href="register.html">Đăng ký ngay</a>
                </p>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
