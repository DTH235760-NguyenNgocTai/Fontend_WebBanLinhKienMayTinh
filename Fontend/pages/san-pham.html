<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm | TK Gear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="san-pham" data-base-path="../">
    <div id="site-header"></div>

    <main class="products-page">
        <section class="container page-shell">
            <div class="products-app-shell">
                <section class="page-hero">
                    <nav class="page-breadcrumb">
                        <a href="../index.html">Trang chủ</a>
                        <span>/</span>
                        <span class="current">Sản phẩm</span>
                    </nav>
                    <h1 class="mb-3">Danh sách sản phẩm</h1>
                    <p class="mb-0">Khám phá sản phẩm, lọc nhanh theo nhu cầu và chọn linh kiện phù hợp.</p>
                </section>

                <div class="products-filter-card">
                    <form id="products-filters-form" class="products-filter-form">
                        <div>
                            <label class="form-label fw-semibold">Từ khóa</label>
                            <input id="filter-tu-khoa" type="search" class="form-control" placeholder="Nhập tên sản phẩm">
                        </div>
                        <div>
                            <label class="form-label fw-semibold">Danh mục</label>
                            <select id="filter-danh-muc" class="form-select">
                                <option value="">Tất cả</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label fw-semibold">Thương hiệu</label>
                            <select id="filter-thuong-hieu" class="form-select">
                                <option value="">Tất cả</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label fw-semibold">Sắp xếp</label>
                            <select id="filter-sap-xep" class="form-select">
                                <option value="ngay_tao_desc">Mới nhất</option>
                                <option value="gia_ban_asc">Giá tăng dần</option>
                                <option value="gia_ban_desc">Giá giảm dần</option>
                                <option value="ten_asc">Tên A-Z</option>
                                <option value="ten_desc">Tên Z-A</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" type="submit">Áp dụng</button>
                        <button class="btn btn-outline-primary" type="button" id="reset-filters-btn">Đặt lại</button>
                    </form>
                </div>

                <section class="products-intro-card">
                    <div>
                        <div class="small-caps mb-2">Kho sản phẩm</div>
                        <h2 class="h4 fw-bold mb-2">Danh sách hiện tại</h2>
                        <p class="text-muted mb-0">Danh sách sản phẩm đang được cập nhật để bạn dễ theo dõi và lựa chọn.</p>
                    </div>
                    <div class="toolbar-chip">
                        <i class="fa-solid fa-layer-group"></i>
                        <span id="products-result-count">0 sản phẩm</span>
                    </div>
                </section>

                <div class="products-grid" id="products-grid"></div>
                <div id="products-pagination"></div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/san-pham.js"></script>
</body>
</html>
