<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body data-page="admin-don-hang" data-base-path="../../">
    <div id="site-header"></div>

    <main>
        <section class="container page-shell">
            <section class="page-hero">
                <nav class="page-breadcrumb">
                    <a href="../../index.html">Trang chủ</a>
                    <span>/</span>
                    <span class="current">Đơn hàng</span>
                </nav>
                <h1 class="mb-3">Quản lý đơn hàng</h1>
                <p class="mb-0">Danh sách đơn, cập nhật trạng thái và xem chi tiết thanh toán/sản phẩm.</p>
            </section>

            <section class="admin-page-grid">
                <div class="admin-card">
                    <div class="admin-toolbar">
                        <div>
                            <h2 class="section-title">Danh sách đơn hàng</h2>
                            <p class="section-subtitle">Theo dõi và cập nhật trạng thái đơn hàng.</p>
                        </div>
                        <input id="admin-order-search" type="search" class="form-control" style="max-width: 320px;" placeholder="Tìm theo mã đơn hoặc người nhận">
                    </div>
                    <div class="table-responsive mt-4">
                        <table class="table admin-table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Đơn hàng</th>
                                    <th>Người nhận</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th>Cập nhật</th>
                                    <th class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="admin-orders-table"></tbody>
                        </table>
                    </div>
                </div>
                <div class="admin-card" id="admin-order-detail"></div>
            </section>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../js/admin/don-hang.js"></script>
</body>
</html>
