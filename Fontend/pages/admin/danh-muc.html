<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body data-page="admin-danh-muc" data-base-path="../../">
    <div id="site-header"></div>

    <main>
        <section class="container page-shell">
            <section class="page-hero">
                <nav class="page-breadcrumb">
                    <a href="../../index.html">Trang chủ</a>
                    <span>/</span>
                    <span class="current">Danh mục</span>
                </nav>
                <h1 class="mb-3">Quản lý danh mục</h1>
                <p class="mb-0">CRUD trực tiếp trên bảng `danh_muc`.</p>
            </section>

            <section class="admin-split">
                <div class="admin-card">
                    <div class="section-heading">
                        <div>
                            <h2 class="section-title">Danh sách danh mục</h2>
                            <p class="section-subtitle">Xem, sửa, xóa danh mục hiện có.</p>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table admin-table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên</th>
                                    <th class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="admin-categories-table"></tbody>
                        </table>
                    </div>
                </div>

                <div class="admin-card">
                    <div class="section-heading">
                        <div>
                            <h2 class="section-title" id="admin-category-form-title">Thêm danh mục</h2>
                            <p class="section-subtitle">Form tối giản đúng với field `ten` trong CSDL.</p>
                        </div>
                    </div>
                    <form id="admin-category-form" class="d-grid gap-3">
                        <div>
                            <label class="form-label fw-semibold">Tên danh mục</label>
                            <input id="category-ten" type="text" class="form-control" required>
                        </div>
                        <div class="d-flex gap-3">
                            <button class="btn btn-primary" type="submit">Lưu danh mục</button>
                            <button class="btn btn-outline-primary" type="button" id="admin-category-reset">Tạo mới</button>
                        </div>
                    </form>
                </div>
            </section>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../js/admin/danh-muc.js"></script>
</body>
</html>
