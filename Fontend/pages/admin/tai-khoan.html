<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài khoản | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body data-page="admin-tai-khoan" data-base-path="../../">
    <div id="site-header"></div>

    <main>
        <section class="container page-shell">
            <section class="page-hero">
                <nav class="page-breadcrumb">
                    <a href="../../index.html">Trang chủ</a>
                    <span>/</span>
                    <span class="current">Tài khoản</span>
                </nav>
                <h1 class="mb-3">Quản lý tài khoản</h1>
                <p class="mb-0">Quản lý thông tin và trạng thái tài khoản trong hệ thống.</p>
            </section>

            <section class="admin-card">
                <div class="admin-toolbar">
                    <div>
                        <h2 class="section-title">Danh sách tài khoản</h2>
                        <p class="section-subtitle">Theo dõi thông tin và cập nhật trạng thái tài khoản.</p>
                    </div>
                    <input id="admin-account-search" type="search" class="form-control" style="max-width: 320px;" placeholder="Tìm theo tên, email hoặc username">
                </div>
                <div class="table-responsive mt-4">
                    <table class="table admin-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Người dùng</th>
                                <th>Username</th>
                                <th>Số điện thoại</th>
                                <th>Vai trò</th>
                                <th>Trạng thái</th>
                                <th>Ngày tạo</th>
                                <th class="text-end">Lưu</th>
                            </tr>
                        </thead>
                        <tbody id="admin-accounts-table"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../js/admin/tai-khoan.js"></script>
</body>
</html>
