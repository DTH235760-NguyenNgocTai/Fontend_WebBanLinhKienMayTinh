<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng | TK Gear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="gio-hang" data-base-path="../">
    <div id="site-header"></div>

    <main>
        <section class="container page-shell" id="cart-page">
            <section class="page-hero">
                <nav class="page-breadcrumb">
                    <a href="../index.html">Trang chủ</a>
                    <span>/</span>
                    <span class="current">Giỏ hàng</span>
                </nav>
                <h1 class="mb-3">Giỏ hàng của bạn</h1>
                <p class="mb-0">Kiểm tra lại sản phẩm, số lượng và tổng tiền trước khi đặt hàng.</p>
            </section>

            <div class="row g-4">
                <div class="col-lg-8" id="cart-content-column">
                    <div class="surface-card p-3 p-lg-4">
                        <div class="table-responsive">
                            <table class="table align-middle cart-table mb-0">
                                <thead>
                                    <tr>
                                        <th>Sản phẩm</th>
                                        <th>Đơn giá</th>
                                        <th>Số lượng</th>
                                        <th>Thành tiền</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="cart-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4" id="cart-summary-column">
                    <div id="cart-summary"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/gio-hang.js"></script>
</body>
</html>
